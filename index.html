<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Dee Pro - Business Calc</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
            --primary: #00a2ff; --accent: #ffcc00; --danger: #ff3e3e; --success: #00ff88;
            --border: #333; --cp-color: #aaa; --input-bg: #000; --input-border: #444;
            --btn-bg: #222; --job-bg: #1a1a1a;
        }
        .light-theme {
            --bg: #f4f5f7; --card: #ffffff; --text: #111111;
            --primary: #0066cc; --accent: #e6b800; --danger: #cc0000; --success: #009944;
            --border: #cccccc; --cp-color: #777777; --input-bg: #ffffff; --input-border: #bbbbbb;
            --btn-bg: #eeeeee; --job-bg: #fdfdfd;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 10px; margin: 0; transition: background 0.3s, color 0.3s; }
        .header { width: 100%; max-width: 1200px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 12px; margin: 0 auto 15px auto; gap: 10px; }
        .header-center { flex-grow: 1; text-align: center; }
        #live-clock { font-size: 1.8em; font-weight: 900; color: var(--text); margin-bottom: 2px; }
        #live-date { font-size: 0.85em; color: var(--primary); text-transform: uppercase; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .config-bar { background: var(--job-bg); padding: 10px; border-radius: 10px; display: flex; gap: 10px; border: 1px solid var(--primary); align-items: flex-end; flex-wrap: wrap;}
        .config-input { background: var(--input-bg); border: 1px solid var(--primary); color: var(--primary); font-weight: bold; text-align: center; border-radius: 4px; padding: 5px; width: 65px; }
        .btn-toggle { background: var(--btn-bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 5px 10px; font-weight: bold; cursor: pointer; transition: 0.2s; height: 30px; display: flex; align-items: center; justify-content: center;}
        .lang-switcher, .curr-switcher { display: flex; gap: 5px; margin-right: 10px; align-items: center; }
        .lang-btn, .curr-btn { background: transparent; border: none; color: #666; cursor: pointer; font-weight: bold; font-size: 0.8em; padding: 2px 5px; transition: 0.3s; }
        .lang-btn.active, .curr-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .btn-info { background: transparent; color: var(--primary); border: 1px solid var(--primary); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 0.7em; cursor: pointer; font-weight: bold; margin-left: 5px;}
        .main-layout { width: 100%; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .main-layout { grid-template-columns: 340px 1fr; } }
        .panel { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); transition: all 0.3s; }
        .sticky { position: sticky; top: 15px; }
        label { display: block; font-size: 0.65em; color: #888; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
        input { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); padding: 10px; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 8px; outline: none; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .status-toggle { display: flex; background: var(--input-bg); border-radius: 8px; border: 1px solid var(--input-border); margin-bottom: 15px; overflow: hidden; }
        .st-btn { flex: 1; padding: 10px; text-align: center; font-weight: bold; cursor: pointer; font-size: 0.8em; color: #777; }
        .st-btn.active { color: #fff; }
        .light-theme .st-btn.active { color: #000; }
        .st-btn-cp.active { background: var(--cp-color); }
        .st-btn-ok.active { background: var(--success); color: #000; }
        .calc-preview { background: rgba(255, 204, 0, 0.05); padding: 12px; border-radius: 10px; margin: 10px 0; border: 1px solid var(--accent); color: var(--accent); }
        .line { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 5px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        @media (min-width: 900px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
        .stat-card { background: var(--job-bg); padding: 12px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-value { font-size: 1.1em; font-weight: 900; }
        .search-input { width: 100%; background: var(--job-bg); border: 2px solid var(--primary); color: var(--text); padding: 12px; border-radius: 10px; font-weight: bold; box-sizing: border-box; margin-bottom: 15px; }
        .job-card { background: var(--job-bg); padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border); display: flex; align-items: center; gap: 15px; justify-content: space-between; flex-wrap: wrap; }
        .type-print { border-left: 5px solid var(--primary); }
        .job-info { flex: 2; min-width: 150px; }
        .job-name { font-weight: bold; display: block; font-size: 1.1em; }
        .job-data { display: flex; gap: 15px; text-align: right; flex-grow: 1; justify-content: flex-end; }
        .data-item { display: flex; flex-direction: column; min-width: 85px; }
        .job-profit { min-width: 80px; text-align: right; font-weight: 900; font-size: 1.3em; border-left: 1px solid var(--border); padding-left: 15px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; backdrop-filter: blur(3px); }
        .modal-content { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 25px; border: 2px solid var(--primary); z-index: 1000; border-radius: 15px; width: 90%; max-width: 400px; }
        .sort-controls { display: flex; flex-direction: column; align-items: center; gap: 4px; padding-right: 10px; border-right: 1px solid var(--border); }
        .sc-drag { font-weight: bold; font-size: 1.3em; cursor: grab; padding: 2px; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <div id="user_display"></div>
        <h1 style="margin:0; font-size:1.4em; color:var(--primary);">3Dee <span style="color:var(--text)">PRO calc</span></h1>
    </div>
    <div class="header-center">
        <div id="live-clock">--:--:--</div>
        <div id="live-date">--.--.---- <button class="btn-info" onclick="openInfo()">i</button></div>
    </div>
    <div class="config-bar">
        <div><label id="cfg_lbl_fil">/KG</label><input type="number" id="cfg_fil" value="19" class="config-input"></div>
        <div><label id="cfg_lbl_ele">/KWH</label><input type="number" id="cfg_ele" value="0.19" class="config-input"></div>
        <div class="curr-switcher">
            <button class="curr-btn active" id="cur_eur" onclick="setCurrency('EUR')">EUR</button>
            <button class="curr-btn" id="cur_czk" onclick="setCurrency('CZK')">CZK</button>
        </div>
        <div class="lang-switcher">
            <button class="lang-btn" id="l_en" onclick="setLang('en')">EN</button>
            <button class="lang-btn" id="l_sk" onclick="setLang('sk')">SK</button>
            <button class="lang-btn" id="l_cz" onclick="setLang('cz')">CZ</button>
        </div>
        <button id="btn_theme" class="btn-toggle" onclick="toggleTheme()">🌙</button>
    </div>
</div>

<div class="main-layout">
    <div class="side-panels">
        <div class="panel sticky">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px;">
                <button class="btn-toggle" style="background:var(--primary); color:white;" onclick="handleCloud('backup')">BACKUP ☁️</button>
                <button class="btn-toggle" onclick="handleCloud('restore')">RESTORE ⬇️</button>
            </div>
            
            <h2 id="form_title" style="color:var(--primary); font-size: 1.1em;">✚ NOVÁ TLAČ</h2>
            <div class="status-toggle">
                <div id="st_cp" class="st-btn st-btn-cp" onclick="setStatus('cp')">Ponuka (CP)</div>
                <div id="st_ok" class="st-btn st-btn-ok active" onclick="setStatus('ok')">Hotovo (OK)</div>
            </div>

            <label id="lbl_name">Názov projektu</label>
            <input type="text" id="in_name" placeholder="...">
            
            <div class="row">
                <div><label id="lbl_w">Váha/ks (g)</label><input type="number" id="in_w" oninput="updateLivePreview()"></div>
                <div><label id="lbl_count">Počet kusov</label><input type="number" id="in_count" value="1" oninput="updateLivePreview()"></div>
            </div>
            <div class="row">
                <div><label id="lbl_h">Hodiny</label><input type="number" id="in_h" oninput="updateLivePreview()"></div>
                <div><label id="lbl_m">Minúty</label><input type="number" id="in_m" oninput="updateLivePreview()"></div>
            </div>
            <label id="lbl_price">Predajná cena / 1 ks</label>
            <input type="number" id="in_price_per" step="any" oninput="updateLivePreview()">

            <div class="calc-preview" id="live_preview">
                <div class="line"><span>MATERIÁL:</span> <span id="pre_mat">0.00</span></div>
                <div class="line"><span>ELEKTRINA:</span> <span id="pre_ele">0.00</span></div>
                <div class="line" style="border-top:1px solid var(--accent); padding-top:5px; margin-top:5px;">
                    <span>ZISK:</span> <span id="pre_profit" style="font-size:1.2em;">0.00</span>
                </div>
            </div>

            <button class="btn-add" id="btn_save" onclick="saveJob()">PRIDAŤ DO ZOZNAMU</button>
        </div>
    </div>

    <div class="content-area">
        <div class="summary-grid">
            <div class="stat-card"><div class="stat-value" id="stat_total_income">0.00</div><label>PRÍJEM</label></div>
            <div class="stat-card"><div class="stat-value" id="total_mat_cost">0.00</div><label>MATERIÁL</label></div>
            <div class="stat-card"><div class="stat-value" id="total_ele_cost">0.00</div><label>ELEKTRINA</label></div>
            <div class="stat-card" style="border:2px solid var(--success);"><div class="stat-value" id="stat_profit" style="color:var(--success)">0.00</div><label>ZISK CELKOM</label></div>
        </div>

        <input type="text" id="search_box" class="search-input" placeholder="Hľadať projekt..." onkeyup="filterJobs()">
        <div id="job_list" ondragover="event.preventDefault()"></div>
    </div>
</div>

<div class="modal-overlay" id="modal_overlay" onclick="closeInfo()"></div>
<div class="modal-content" id="info_modal">
    <h3 style="color:var(--primary); margin-top:0;">3Dee PRO Info</h3>
    <div id="info_text_content" style="font-size:0.9em; line-height:1.4;">
        Aplikácia počíta náklady na základe váhy filamentu a času tlače (predpokladaný odber 150W). Všetky dáta sa ukladajú lokálne.
    </div>
    <button class="btn-modal-close" onclick="closeInfo()">ZAVRIEŤ</button>
</div>

<script>
    let jobs = JSON.parse(localStorage.getItem('3dee_jobs')) || [];
    let currency = localStorage.getItem('3dee_curr') || 'EUR';
    let lang = localStorage.getItem('3dee_lang') || 'sk';
    let currentStatus = 'ok';
    let draggedItemIndex = null;

    // --- LOGIKA HODÍN ---
    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString();
        document.getElementById('live-date').innerText = now.toLocaleDateString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    // --- LIVE PREVIEW ---
    function updateLivePreview() {
        const w = parseFloat(document.getElementById('in_w').value) || 0;
        const count = parseFloat(document.getElementById('in_count').value) || 1;
        const h = parseFloat(document.getElementById('in_h').value) || 0;
        const m = parseFloat(document.getElementById('in_m').value) || 0;
        const price = parseFloat(document.getElementById('in_price_per').value) || 0;
        
        const filPrice = parseFloat(document.getElementById('cfg_fil').value) || 19;
        const elePrice = parseFloat(document.getElementById('cfg_ele').value) || 0.19;

        const totalMat = (w / 1000) * filPrice * count;
        const totalTime = h + (m / 60);
        const totalEle = totalTime * 0.15 * elePrice * count; // 150W priemer
        const totalProfit = (price * count) - totalMat - totalEle;

        document.getElementById('pre_mat').innerText = totalMat.toFixed(2) + " " + currency;
        document.getElementById('pre_ele').innerText = totalEle.toFixed(2) + " " + currency;
        document.getElementById('pre_profit').innerText = totalProfit.toFixed(2) + " " + currency;
    }

    // --- UKLADANIE ---
    function saveJob() {
        const job = {
            id: Date.now(),
            name: document.getElementById('in_name').value || 'Nepomenovaný projekt',
            weight: parseFloat(document.getElementById('in_w').value) || 0,
            count: parseInt(document.getElementById('in_count').value) || 1,
            hours: parseInt(document.getElementById('in_h').value) || 0,
            mins: parseInt(document.getElementById('in_m').value) || 0,
            price: parseFloat(document.getElementById('in_price_per').value) || 0,
            status: currentStatus,
            timestamp: new Date().toISOString()
        };
        jobs.unshift(job);
        renderJobs();
        clearForm();
    }

    function renderJobs() {
        localStorage.setItem('3dee_jobs', JSON.stringify(jobs));
        const list = document.getElementById('job_list');
        list.innerHTML = '';
        
        let s_inc = 0, s_mat = 0, s_ele = 0;
        const filPrice = parseFloat(document.getElementById('cfg_fil').value);
        const elePrice = parseFloat(document.getElementById('cfg_ele').value);

        jobs.forEach((j, index) => {
            const mCost = (j.weight / 1000) * filPrice * j.count;
            const eCost = (j.hours + j.mins/60) * 0.15 * elePrice * j.count;
            const profit = (j.price * j.count) - mCost - eCost;

            if(j.status === 'ok') {
                s_inc += (j.price * j.count);
                s_mat += mCost; s_ele += eCost;
            }

            const div = document.createElement('div');
            div.className = `job-card type-print ${j.status === 'cp' ? 'is-cp' : ''}`;
            div.draggable = true;
            div.ondragstart = () => draggedItemIndex = index;
            div.ondragover = (e) => e.preventDefault();
            div.ondrop = () => {
                const item = jobs.splice(draggedItemIndex, 1)[0];
                jobs.splice(index, 0, item);
                renderJobs();
            };

            div.innerHTML = `
                <div class="sort-controls"><span class="sc-drag">☰</span></div>
                <div class="job-info">
                    <span class="job-name">${j.name}</span>
                    <small>${j.count}ks | ${j.weight}g | ${j.hours}h ${j.mins}m</small>
                </div>
                <div class="job-data">
                    <div class="data-item">
                        <span style="font-size:0.7em; color:#888;">NÁKLADY</span>
                        <b>${(mCost + eCost).toFixed(2)} ${currency}</b>
                    </div>
                </div>
                <div class="job-profit">
                    <span style="font-size:0.5em; display:block; color:#888;">ZISK</span>
                    <span style="color:var(--success)">${profit.toFixed(2)}</span>
                </div>
                <button onclick="deleteJob(${j.id})" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">✕</button>
            `;
            list.appendChild(div);
        });

        document.getElementById('stat_total_income').innerText = s_inc.toFixed(2);
        document.getElementById('total_mat_cost').innerText = s_mat.toFixed(2);
        document.getElementById('total_ele_cost').innerText = s_ele.toFixed(2);
        document.getElementById('stat_profit').innerText = (s_inc - s_mat - s_ele).toFixed(2);
    }

    function deleteJob(id) {
        if(confirm('Naozaj vymazať?')) {
            jobs = jobs.filter(j => j.id !== id);
            renderJobs();
        }
    }

    function clearForm() {
        document.getElementById('in_name').value = '';
        document.getElementById('in_w').value = '';
        document.getElementById('in_h').value = '';
        document.getElementById('in_m').value = '';
        document.getElementById('in_price_per').value = '';
        updateLivePreview();
    }

    function setStatus(s) {
        currentStatus = s;
        document.getElementById('st_cp').classList.toggle('active', s === 'cp');
        document.getElementById('st_ok').classList.toggle('active', s === 'ok');
    }

    function toggleTheme() {
        document.body.classList.toggle('light-theme');
        const isLight = document.body.classList.contains('light-theme');
        document.getElementById('btn_theme').innerText = isLight ? '☀️' : '🌙';
    }

    function filterJobs() {
        const query = document.getElementById('search_box').value.toLowerCase();
        const cards = document.querySelectorAll('.job-card');
        cards.forEach(card => {
            const name = card.querySelector('.job-name').innerText.toLowerCase();
            card.style.display = name.includes(query) ? 'flex' : 'none';
        });
    }

    function setCurrency(c) {
        currency = c;
        document.getElementById('cur_eur').classList.toggle('active', c === 'EUR');
        document.getElementById('cur_czk').classList.toggle('active', c === 'CZK');
        updateLivePreview();
        renderJobs();
    }

    function openInfo() {
        document.getElementById('modal_overlay').style.display = 'block';
        document.getElementById('info_modal').style.display = 'block';
    }
    function closeInfo() {
        document.getElementById('modal_overlay').style.display = 'none';
        document.getElementById('info_modal').style.display = 'none';
    }

    // Inicializácia
    renderJobs();
</script>

</body>
</html>
