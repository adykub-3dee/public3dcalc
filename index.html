<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Dee Pro - Cloud & Business</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #111111; --text: #ffffff;
            --primary: #00a2ff; --accent: #ffcc00; --danger: #ff3e3e; --success: #00ff88;
            --border: #222; --input-bg: #000; --input-border: #333;
            --btn-bg: #1a1a1a; --job-bg: #141414;
        }

        .light-theme {
            --bg: #f4f5f7; --card: #ffffff; --text: #111111;
            --primary: #0066cc; --accent: #e6b800; --danger: #cc0000; --success: #009944;
            --border: #cccccc; --input-bg: #ffffff; --input-border: #bbbbbb;
            --btn-bg: #eeeeee; --job-bg: #fdfdfd;
        }

        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg); color: var(--text); padding: 10px; margin: 0; transition: 0.3s; }
        
        /* HEADER & CONFIG */
        .header { width: 100%; max-width: 1200px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 12px; margin: 0 auto 15px auto; gap: 10px; }
        #live-clock { font-size: 1.8em; font-weight: 900; }
        #live-date { font-size: 0.85em; color: var(--primary); font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .config-bar { background: var(--job-bg); padding: 10px; border-radius: 10px; display: flex; gap: 10px; border: 1px solid var(--primary); align-items: flex-end; }
        .config-input { background: var(--input-bg); border: 1px solid var(--primary); color: var(--primary); font-weight: bold; text-align: center; border-radius: 4px; padding: 5px; width: 65px; }
        
        .main-layout { width: 100%; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 992px) { .main-layout { grid-template-columns: 340px 1fr; } }

        /* FORM */
        .panel { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); position: sticky; top: 15px; }
        label { display: block; font-size: 0.65em; color: #888; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
        input { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); padding: 10px; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 8px; outline: none; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .status-toggle { display: flex; background: var(--input-bg); border-radius: 8px; border: 1px solid var(--input-border); margin-bottom: 15px; overflow: hidden; }
        .st-btn { flex: 1; padding: 10px; text-align: center; font-weight: bold; cursor: pointer; font-size: 0.8em; color: #777; }
        .st-btn.active { color: #fff; }
        .st-btn-ok.active { background: var(--success); color: #000; }
        .st-btn-cp.active { background: #666; color: #fff; }

        .calc-preview { background: rgba(255, 204, 0, 0.05); padding: 12px; border-radius: 10px; margin: 10px 0; border: 1px solid var(--accent); color: var(--accent); }
        .btn-add { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* SUMMARY */
        .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        @media (min-width: 600px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
        .stat-card { background: var(--job-bg); padding: 10px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-value { font-size: 1.1em; font-weight: 900; }

        /* JOB CARD (PODĽA FOTKY) */
        .job-card { 
            background: #141414; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            display: flex; 
            align-items: center; 
            overflow: hidden; 
            border: 1px solid #222;
            min-height: 80px;
        }
        .card-accent { width: 6px; background: var(--primary); align-self: stretch; }
        .card-sort { display: flex; flex-direction: column; align-items: center; padding: 0 10px; color: #666; gap: 5px; border-right: 1px solid #222; }
        .sort-arrow { cursor: pointer; font-size: 0.8em; }
        .sort-drag { font-size: 1.2em; font-weight: bold; }

        .card-main { padding: 10px 15px; flex-grow: 1; }
        .card-name-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
        .card-title { font-size: 1.3em; font-weight: 800; text-transform: lowercase; }
        .badge-status { font-size: 0.65em; padding: 2px 6px; border-radius: 4px; font-weight: 900; }
        .badge-ok { background: var(--success); color: #000; }
        .badge-cp { background: #666; color: #fff; }
        .card-specs { color: #888; font-size: 0.85em; font-weight: bold; margin-bottom: 2px; }
        .card-date { color: #555; font-size: 0.75em; }

        .card-data-box { display: flex; gap: 30px; padding: 0 20px; border-right: 1px solid #222; }
        .data-column { text-align: center; }
        .data-label { font-size: 0.6em; color: #888; font-weight: bold; text-transform: uppercase; display: block; }
        .data-val { font-size: 1.2em; font-weight: 900; }
        .data-sub { font-size: 0.65em; color: #666; display: block; }
        
        .val-cost { color: var(--danger); }
        .val-sell { color: var(--primary); }
        .val-profit { color: var(--success); font-size: 1.4em; }

        .card-profit-section { padding: 0 20px; text-align: right; min-width: 100px; }

        .card-actions { display: flex; gap: 8px; padding: 0 15px; }
        .action-btn { 
            background: #1a1a1a; border: 1px solid #333; color: #888; 
            padding: 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; 
            display: flex; align-items: center; justify-content: center; width: 34px; height: 34px;
        }
        .action-btn:hover { background: #222; border-color: #555; }
        .btn-status-ok { background: var(--success) !important; color: #000 !important; font-weight: 900; width: 50px; border-radius: 8px; }
        .btn-delete:hover { color: var(--danger); }
    </style>
</head>
<body>

<div class="header">
    <div>
        <div id="user_display" style="font-size:0.8em; color:var(--success); font-weight:900;"></div>
        <h1 style="margin:0; font-size:1.4em; color:var(--primary);">3Dee <span style="color:var(--text)">PRO calc</span></h1>
    </div>
    <div style="text-align:center;">
        <div id="live-clock">00:00:00</div>
        <div id="live-date">--.--.----</div>
    </div>
    <div class="config-bar">
        <div><label>/KG</label><input type="number" id="cfg_fil" value="19" class="config-input"></div>
        <div><label>/KWH</label><input type="number" id="cfg_ele" value="0.19" class="config-input"></div>
        <button id="btn_theme" onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size:1.2em;">🌙</button>
    </div>
</div>

<div class="main-layout">
    <div class="panel">
        <h2 id="form_title" style="color:var(--primary); font-size: 1.1em; margin-bottom: 15px;">✚ NOVÁ TLAČ</h2>
        
        <label>TYP ZÁZNAMU</label>
        <div class="status-toggle">
            <div id="st_cp" class="st-btn st-btn-cp" onclick="setStatus('cp')">Ponuka (CP)</div>
            <div id="st_ok" class="st-btn st-btn-ok active" onclick="setStatus('ok')">Hotovo (OK)</div>
        </div>

        <label>Názov Projektu</label>
        <input type="text" id="in_name" placeholder="auto">
        <div class="row">
            <div><label>Váha/ks (g)</label><input type="number" id="in_w" value="200"></div>
            <div><label>Počet ks</label><input type="number" id="in_count" value="1"></div>
        </div>
        <div class="row">
            <div><label>Hodiny</label><input type="number" id="in_h" value="3"></div>
            <div><label>Minúty</label><input type="number" id="in_m" value="0"></div>
        </div>
        <label>Predajná cena / 1 ks (€)</label>
        <input type="number" id="in_price_per" value="7.00">
        
        <div class="calc-preview" id="preview_box">
            <div style="display:flex; justify-content:space-between;"><span>NÁKLAD:</span> <b id="view_cost">0.00 €</b></div>
            <div style="display:flex; justify-content:space-between; font-size:1.2em; margin-top:5px;"><span>ZISK:</span> <b id="view_profit">0.00 €</b></div>
        </div>
        
        <button class="btn-add" onclick="saveItem()">ULOŽIŤ DO HISTÓRIE</button>
    </div>

    <div>
        <div class="summary-grid" id="summary_container">
            </div>
        <input type="text" id="search_input" placeholder="🔍 Vyhľadať v histórii..." oninput="refreshUI()" style="width:100%; padding:12px; background:var(--job-bg); border:1px solid var(--border); border-radius:10px; color:#fff; margin-bottom:15px;">
        <div id="list_container"></div>
    </div>
</div>

<script>
    let items = JSON.parse(localStorage.getItem('3dee_items')) || [];
    let currentStatus = 'ok';
    let isDark = true;

    function toggleTheme() {
        isDark = !isDark;
        document.body.classList.toggle('light-theme', !isDark);
        document.getElementById('btn_theme').innerText = isDark ? "🌙" : "☀️";
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('sk-SK');
        document.getElementById('live-date').innerText = now.toLocaleDateString('sk-SK', {day:'2-digit', month:'2-digit', year:'numeric'});
    }
    setInterval(updateClock, 1000); updateClock();

    function setStatus(s) {
        currentStatus = s;
        document.getElementById('st_cp').classList.toggle('active', s === 'cp');
        document.getElementById('st_ok').classList.toggle('active', s === 'ok');
    }

    function calculate(w, count, h, m, pricePer) {
        const filPrice = parseFloat(document.getElementById('cfg_fil').value) || 19;
        const elePrice = parseFloat(document.getElementById('cfg_ele').value) || 0.19;
        
        const totalW = w * count;
        const totalHours = (h + m/60) * count;
        
        const costMat = (totalW / 1000) * filPrice;
        const costEle = totalHours * 0.12 * elePrice; // Predpoklad 120W spotreba
        const totalCost = costMat + costEle;
        const totalSell = pricePer * count;
        const profit = totalSell - totalCost;

        return { totalCost, totalSell, profit, totalW, totalHours };
    }

    function saveItem() {
        const name = document.getElementById('in_name').value || "Bez názvu";
        const w = parseFloat(document.getElementById('in_w').value) || 0;
        const count = parseInt(document.getElementById('in_count').value) || 1;
        const h = parseInt(document.getElementById('in_h').value) || 0;
        const m = parseInt(document.getElementById('in_m').value) || 0;
        const pricePer = parseFloat(document.getElementById('in_price_per').value) || 0;

        const res = calculate(w, count, h, m, pricePer);

        const newItem = {
            id: Date.now(),
            name, w, count, h, m, pricePer,
            status: currentStatus,
            cost: res.totalCost,
            sell: res.totalSell,
            profit: res.profit,
            date: new Date().toLocaleString('sk-SK')
        };

        items.unshift(newItem);
        localStorage.setItem('3dee_items', JSON.stringify(items));
        refreshUI();
    }

    function deleteItem(id) {
        if(confirm("Zmazať položku?")) {
            items = items.filter(i => i.id !== id);
            localStorage.setItem('3dee_items', JSON.stringify(items));
            refreshUI();
        }
    }

    function duplicateItem(id) {
        const original = items.find(i => i.id === id);
        if(original) {
            const copy = {...original, id: Date.now(), date: new Date().toLocaleString('sk-SK')};
            items.unshift(copy);
            localStorage.setItem('3dee_items', JSON.stringify(items));
            refreshUI();
        }
    }

    function refreshUI() {
        const container = document.getElementById('list_container');
        const search = document.getElementById('search_input').value.toLowerCase();
        container.innerHTML = "";

        let totalProfit = 0, totalObrat = 0, totalCost = 0;

        items.filter(i => i.name.toLowerCase().includes(search)).forEach((item, index) => {
            totalProfit += item.profit;
            totalObrat += item.sell;
            totalCost += item.cost;

            const html = `
                <div class="job-card">
                    <div class="card-accent"></div>
                    <div class="card-sort">
                        <span class="sort-arrow">▲</span>
                        <span class="sort-drag">＝</span>
                        <span class="sort-arrow">▼</span>
                    </div>
                    <div class="card-main">
                        <div class="card-name-row">
                            <span class="card-title">${item.name}</span>
                            <span class="badge-status ${item.status === 'ok' ? 'badge-ok' : 'badge-cp'}">${item.status.toUpperCase()}</span>
                        </div>
                        <div class="card-specs">${item.w}g | ${item.h}h ${item.m}m</div>
                        <div class="card-date">${item.date}</div>
                    </div>
                    <div class="card-data-box">
                        <div class="data-column">
                            <span class="data-label">NÁKLAD</span>
                            <span class="data-val val-cost">${item.cost.toFixed(2)} €</span>
                            <span class="data-sub">1ks (${(item.cost/item.count).toFixed(2)} €/ks)</span>
                        </div>
                        <div class="data-column">
                            <span class="data-label">PREDAJ</span>
                            <span class="data-val val-sell">${item.sell.toFixed(2)} €</span>
                            <span class="data-sub">1ks (${item.pricePer.toFixed(2)} €/ks)</span>
                        </div>
                    </div>
                    <div class="card-profit-section">
                        <span class="data-label">ZISK</span>
                        <span class="data-val val-profit">${item.profit.toFixed(2)}€</span>
                    </div>
                    <div class="card-actions">
                        <button class="action-btn btn-status-ok">OK</button>
                        <button class="action-btn" onclick="duplicateItem(${item.id})">❐</button>
                        <button class="action-btn">✎</button>
                        <button class="action-btn btn-delete" onclick="deleteItem(${item.id})">🗑</button>
                    </div>
                </div>
            `;
            container.innerHTML += html;
        });

        // Update Stats
        document.getElementById('summary_container').innerHTML = `
            <div class="stat-card"><div class="data-label">OBRAT</div><div class="stat-value">${totalObrat.toFixed(2)} €</div></div>
            <div class="stat-card"><div class="data-label">NÁKLADY</div><div class="stat-value val-cost">${totalCost.toFixed(2)} €</div></div>
            <div class="stat-card" style="border-color:var(--success)"><div class="data-label" style="color:var(--success)">ČISTÝ ZISK</div><div class="stat-value val-profit">${totalProfit.toFixed(2)} €</div></div>
            <div class="stat-card"><div class="data-label">POČET</div><div class="stat-value">${items.length}</div></div>
        `;
    }

    // Live náhľad pri písaní
    function updateLivePreview() {
        const w = parseFloat(document.getElementById('in_w').value) || 0;
        const count = parseInt(document.getElementById('in_count').value) || 1;
        const h = parseInt(document.getElementById('in_h').value) || 0;
        const m = parseInt(document.getElementById('in_m').value) || 0;
        const pricePer = parseFloat(document.getElementById('in_price_per').value) || 0;
        
        const res = calculate(w, count, h, m, pricePer);
        document.getElementById('view_cost').innerText = res.totalCost.toFixed(2) + " €";
        document.getElementById('view_profit').innerText = res.profit.toFixed(2) + " €";
    }

    document.querySelectorAll('input').forEach(input => input.addEventListener('input', updateLivePreview));

    refreshUI();
</script>

</body>
</html>
