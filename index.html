<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Dee Pro - Cloud & Business</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
            --primary: #00a2ff; --accent: #ffcc00; --danger: #ff3e3e; --success: #00ff88;
            --border: #333; --cp-color: #aaa; --input-bg: #000; --input-border: #444;
            --btn-bg: #222; --job-bg: #111;
        }

        .light-theme {
            --bg: #f4f5f7; --card: #ffffff; --text: #111111;
            --primary: #0066cc; --accent: #e6b800; --danger: #cc0000; --success: #009944;
            --border: #cccccc; --cp-color: #777777; --input-bg: #ffffff; --input-border: #bbbbbb;
            --btn-bg: #eeeeee; --job-bg: #fdfdfd;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 10px; margin: 0; transition: background 0.3s, color 0.3s; }
        
        #user_display { font-size: 0.8em; color: var(--success); font-weight: bold; margin-bottom: 5px; text-transform: uppercase; min-height: 1.2em; }

        .header { width: 100%; max-width: 1200px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 12px; margin: 0 auto 15px auto; gap: 10px; }
        .header-center { flex-grow: 1; text-align: center; }
        #live-clock { font-size: 1.8em; font-weight: 900; color: var(--text); margin-bottom: 2px; }
        #live-date { font-size: 0.85em; color: var(--primary); text-transform: uppercase; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        .config-bar { background: var(--job-bg); padding: 10px; border-radius: 10px; display: flex; gap: 10px; border: 1px solid var(--primary); align-items: flex-end; flex-wrap: wrap;}
        .config-input { background: var(--input-bg); border: 1px solid var(--primary); color: var(--primary); font-weight: bold; text-align: center; border-radius: 4px; padding: 5px; width: 65px; }
        .btn-toggle { background: var(--btn-bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 5px 10px; font-weight: bold; cursor: pointer; transition: 0.2s; height: 30px; display: flex; align-items: center; justify-content: center;}
        
        .lang-switcher, .curr-switcher { display: flex; gap: 5px; margin-right: 10px; align-items: center; }
        .lang-btn, .curr-btn { background: transparent; border: none; color: #666; cursor: pointer; font-weight: bold; font-size: 0.8em; padding: 2px 5px; transition: 0.3s; }
        .lang-btn.active, .curr-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .main-layout { width: 100%; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 992px) { .main-layout { grid-template-columns: 340px 1fr; } }

        .panel { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); }
        .sticky { position: sticky; top: 15px; }

        label { display: block; font-size: 0.65em; color: #888; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
        input { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); padding: 10px; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 8px; outline: none; }
        
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .status-toggle { display: flex; background: var(--input-bg); border-radius: 8px; border: 1px solid var(--input-border); margin-bottom: 15px; overflow: hidden; }
        .st-btn { flex: 1; padding: 10px; text-align: center; font-weight: bold; cursor: pointer; font-size: 0.8em; color: #777; }
        .st-btn.active { color: #fff; }
        .st-btn-cp.active { background: var(--cp-color); }
        .st-btn-ok.active { background: var(--success); color: #000; }

        .calc-preview { background: rgba(255, 204, 0, 0.05); padding: 12px; border-radius: 10px; margin: 10px 0; border: 1px solid var(--accent); color: var(--accent); }
        .line { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 5px; }

        .btn-add { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 5px; }

        /* SUMMARY CARDS */
        .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        @media (min-width: 600px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
        .stat-card { background: var(--job-bg); padding: 12px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-label { font-size: 0.6em; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1.1em; font-weight: 900; }

        /* JOB CARD - PODĽA FOTKY */
        .job-card { 
            background: #111; 
            border: 1px solid #333; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            display: flex; 
            align-items: center; 
            overflow: hidden; 
            position: relative;
            transition: 0.2s;
        }
        .card-accent { width: 5px; background: var(--primary); align-self: stretch; }
        .card-sort { display: flex; flex-direction: column; align-items: center; padding: 0 10px; color: #555; gap: 2px; border-right: 1px solid #222; }
        .sc-btn { cursor: pointer; font-size: 0.7em; }
        .sc-drag { font-size: 1.1em; font-weight: bold; }

        .card-main { padding: 12px 15px; flex-grow: 1; }
        .card-header-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .card-title { font-size: 1.3em; font-weight: 800; text-transform: lowercase; }
        .tag { font-size: 0.65em; padding: 2px 6px; border-radius: 4px; font-weight: 900; }
        .tag-ok { background: var(--success); color: #000; }
        .tag-cp { background: #666; color: #fff; }
        .card-specs { color: #888; font-size: 0.85em; font-weight: bold; }
        .card-date { color: #444; font-size: 0.7em; }

        .card-data-row { display: flex; gap: 25px; padding: 0 20px; border-right: 1px solid #222; }
        .data-col { text-align: center; min-width: 80px; }
        .data-lbl { font-size: 0.55em; color: #666; font-weight: bold; text-transform: uppercase; display: block; }
        .data-val { font-size: 1.15em; font-weight: 900; }
        .data-sub { font-size: 0.6em; color: #555; display: block; }
        
        .val-danger { color: var(--danger); }
        .val-primary { color: var(--primary); }
        .val-success { color: var(--success); font-size: 1.3em; }

        .card-actions { display: flex; gap: 6px; padding: 0 15px; }
        .act-btn { 
            background: #1a1a1a; border: 1px solid #333; color: #888; 
            width: 32px; height: 32px; border-radius: 6px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; font-size: 0.9em;
        }
        .act-btn-ok { background: var(--success) !important; color: #000 !important; font-weight: 900; width: 45px; }

        .search-input { width: 100%; background: var(--job-bg); border: 2px solid var(--primary); color: var(--text); padding: 12px; border-radius: 10px; font-weight: bold; box-sizing: border-box; margin-bottom: 15px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; backdrop-filter: blur(3px); }
        .modal-content { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 25px; border: 2px solid var(--primary); z-index: 1000; border-radius: 15px; width: 90%; max-width: 400px; }
        .btn-modal-close { background: var(--primary); color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; margin-top: 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <div id="user_display"></div>
        <h1 style="margin:0; font-size:1.4em; color:var(--primary);">3Dee <span style="color:var(--text)">PRO calc</span></h1>
    </div>
    <div class="header-center">
        <div id="live-clock">--:--:--</div>
        <div id="live-date">--.--.----</div>
    </div>
    <div class="config-bar">
        <div><label id="cfg_lbl_fil">/KG</label><input type="number" id="cfg_fil" value="19" class="config-input"></div>
        <div><label id="cfg_lbl_ele">/KWH</label><input type="number" id="cfg_ele" value="0.19" class="config-input"></div>
        <div class="curr-switcher">
            <button class="curr-btn active" id="cur_eur" onclick="setCurrency('EUR')">EUR</button>
            <button class="curr-btn" id="cur_czk" onclick="setCurrency('CZK')">CZK</button>
        </div>
        <div class="lang-switcher">
            <button class="lang-btn" id="l_en" onclick="setLang('en')">EN</button>
            <button class="lang-btn active" id="l_sk" onclick="setLang('sk')">SK</button>
        </div>
        <button id="btn_theme" class="btn-toggle" onclick="toggleTheme()">🌙</button>
    </div>
</div>

<div class="main-layout">
    <div class="side-panels">
        <div class="panel sticky">
            <div style="margin-bottom:20px; display:grid; gap:8px;">
                <button class="btn-add" style="background:var(--success); color:#000;" onclick="handleCloud('register')">👤 CREATE USER</button>
                <div class="row">
                    <button class="btn-toggle" style="background:#0044cc; color:white; border:none; height:40px;" onclick="handleCloud('backup')">☁️ BACKUP</button>
                    <button class="btn-toggle" style="height:40px;" onclick="handleCloud('restore')">⬇️ RESTORE</button>
                </div>
            </div>

            <h2 id="form_title" style="color:var(--primary); font-size: 1.1em; margin-bottom: 15px;">✚ NEW PRINT</h2>
            <label id="lbl_type">Record Type</label>
            <div class="status-toggle">
                <div id="st_cp" class="st-btn st-btn-cp" onclick="setStatus('cp')">Quote (CP)</div>
                <div id="st_ok" class="st-btn st-btn-ok active" onclick="setStatus('ok')">Done (OK)</div>
            </div>

            <label id="lbl_name">Project Name</label>
            <input type="text" id="in_name" placeholder="...">
            <div class="row">
                <div><label id="lbl_w">Weight/pc (g)</label><input type="number" id="in_w" step="any"></div>
                <div><label id="lbl_count">Quantity</label><input type="number" id="in_count" value="1"></div>
            </div>
            <div class="row">
                <div><label id="lbl_h">Hours</label><input type="number" id="in_h"></div>
                <div><label id="lbl_m">Minutes</label><input type="number" id="in_m"></div>
            </div>
            <label id="lbl_price">Sell Price / 1 pc</label>
            <input type="number" id="in_price_per" step="any">
            
            <div class="calc-preview">
                <div class="line"><span id="lbl_cost_tot">COST:</span> <span id="view_total_cost">0.00 €</span></div>
                <div class="line" style="border-top: 1px solid var(--border); padding-top: 5px; font-size: 1.1em;">
                    <span id="lbl_profit_tot">NET PROFIT:</span> <span id="view_total_profit">0.00 €</span>
                </div>
            </div>
            <button class="btn-add" id="btn_save" onclick="saveItem()">SAVE TO HISTORY</button>
        </div>
    </div>

    <div>
        <div class="summary-grid">
            <div class="stat-card"><div class="stat-label">OBRAT</div><div class="stat-value" id="stat_obrat">0.00 €</div></div>
            <div class="stat-card"><div class="stat-label">NÁKLAD</div><div class="stat-value" id="total_mat_cost" style="color:var(--danger)">0.00 €</div></div>
            <div class="stat-card" style="border: 1px solid var(--success);"><div class="stat-label" style="color:var(--success)">ZISK</div><div class="stat-value" id="stat_profit" style="color:var(--success)">0.00 €</div></div>
            <div class="stat-card"><div class="stat-label">POČET</div><div class="stat-value" id="stat_count">0</div></div>
        </div>
        <input type="text" id="search_input" class="search-input" placeholder="🔍 Search history..." oninput="refreshUI()">
        <div id="list_container"></div>
    </div>
</div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbye0UEufz4q1YGneWZKxqr3CERoC0e4FfALX-2vnqkSpVDkuTJWnMCA6px27X7RXLXu/exec";
    let items = JSON.parse(localStorage.getItem('3dee_data')) || [];
    let editingId = null;
    let currentStatus = 'ok';
    let isDark = true;
    let loggedUserNick = "";
    let currentLang = 'sk';
    let currentCurr = 'EUR';
    const exchangeRate = 25.0;

    function getSym() { return currentCurr === 'EUR' ? '€' : 'Kč'; }

    function toggleTheme() {
        isDark = !isDark;
        document.body.classList.toggle('light-theme', !isDark);
        document.getElementById('btn_theme').innerText = isDark ? "🌙" : "☀️";
    }

    function setCurrency(c) {
        currentCurr = c;
        document.getElementById('cur_eur').classList.toggle('active', c === 'EUR');
        document.getElementById('cur_czk').classList.toggle('active', c === 'CZK');
        refreshUI();
    }

    function setLang(l) {
        currentLang = l;
        document.getElementById('l_en').classList.toggle('active', l === 'en');
        document.getElementById('l_sk').classList.toggle('active', l === 'sk');
    }

    function setStatus(s) {
        currentStatus = s;
        document.getElementById('st_cp').classList.toggle('active', s === 'cp');
        document.getElementById('st_ok').classList.toggle('active', s === 'ok');
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('sk-SK');
        document.getElementById('live-date').innerText = now.toLocaleDateString('sk-SK', {day:'2-digit', month:'2-digit', year:'numeric'});
    }
    setInterval(updateClock, 1000); updateClock();

    function updatePreview() {
        const w = parseFloat(document.getElementById('in_w').value) || 0;
        const count = parseInt(document.getElementById('in_count').value) || 1;
        const h = parseFloat(document.getElementById('in_h').value) || 0;
        const m = parseFloat(document.getElementById('in_m').value) || 0;
        const pricePer = parseFloat(document.getElementById('in_price_per').value) || 0;
        const f = parseFloat(document.getElementById('cfg_fil').value) || 19;
        const e = parseFloat(document.getElementById('cfg_ele').value) || 0.19;

        const totalW = w * count;
        const totalHours = (h + m/60) * count;
        const cost = (totalW/1000 * f) + (totalHours * 0.12 * e);
        const profit = (pricePer * count) - cost;

        document.getElementById('view_total_cost').innerText = cost.toFixed(2) + " " + getSym();
        document.getElementById('view_total_profit').innerText = profit.toFixed(2) + " " + getSym();
        return { cost, profit, totalSell: pricePer * count, totalW, totalHours };
    }

    function saveItem() {
        const calc = updatePreview();
        const newItem = {
            id: editingId || Date.now(),
            name: document.getElementById('in_name').value || "Project",
            w: parseFloat(document.getElementById('in_w').value) || 0,
            count: parseInt(document.getElementById('in_count').value) || 1,
            h: parseInt(document.getElementById('in_h').value) || 0,
            m: parseInt(document.getElementById('in_m').value) || 0,
            pricePer: parseFloat(document.getElementById('in_price_per').value) || 0,
            status: currentStatus,
            cost: calc.cost,
            sell: calc.totalSell,
            profit: calc.profit,
            date: new Date().toLocaleDateString('sk-SK'),
            currency: currentCurr // Ukladáme menu záznamu
        };

        if(editingId) items = items.map(i => i.id === editingId ? newItem : i);
        else items.unshift(newItem);
        
        editingId = null;
        localStorage.setItem('3dee_data', JSON.stringify(items));
        clearForm();
        refreshUI();
    }

    function clearForm() {
        ['in_name', 'in_w', 'in_h', 'in_m', 'in_price_per'].forEach(id => document.getElementById(id).value = "");
        document.getElementById('in_count').value = "1";
        document.getElementById('form_title').innerText = "✚ NEW PRINT";
    }

    function deleteItem(id) {
        if(confirm("Zmazať?")) {
            items = items.filter(i => i.id !== id);
            localStorage.setItem('3dee_data', JSON.stringify(items));
            refreshUI();
        }
    }

    function duplicateItem(id) {
        const original = items.find(i => i.id === id);
        if(original) {
            const copy = {...original, id: Date.now(), date: new Date().toLocaleDateString('sk-SK')};
            items.unshift(copy);
            localStorage.setItem('3dee_data', JSON.stringify(items));
            refreshUI();
        }
    }

    function editItem(id) {
        const i = items.find(x => x.id === id);
        if(!i) return;
        editingId = i.id;
        document.getElementById('in_name').value = i.name;
        document.getElementById('in_w').value = i.w;
        document.getElementById('in_count').value = i.count;
        document.getElementById('in_h').value = i.h;
        document.getElementById('in_m').value = i.m;
        document.getElementById('in_price_per').value = i.pricePer;
        setStatus(i.status);
        document.getElementById('form_title').innerText = "✎ EDIT PRINT";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function refreshUI() {
        const container = document.getElementById('list_container');
        const search = document.getElementById('search_input').value.toLowerCase();
        const sym = getSym();
        container.innerHTML = "";

        let sObrat = 0, sCost = 0, sProfit = 0;

        items.filter(i => i.name.toLowerCase().includes(search)).forEach(item => {
            // Dynamický prepočet pre zobrazenie podľa vybranej meny
            let displayCost = item.cost;
            let displaySell = item.sell;
            let displayProfit = item.profit;

            if (item.currency === 'EUR' && currentCurr === 'CZK') {
                displayCost *= exchangeRate; displaySell *= exchangeRate; displayProfit *= exchangeRate;
            } else if (item.currency === 'CZK' && currentCurr === 'EUR') {
                displayCost /= exchangeRate; displaySell /= exchangeRate; displayProfit /= exchangeRate;
            }

            sObrat += displaySell; sCost += displayCost; sProfit += displayProfit;

            container.innerHTML += `
                <div class="job-card">
                    <div class="card-accent"></div>
                    <div class="card-sort">
                        <span class="sc-btn">▲</span>
                        <span class="sc-drag">＝</span>
                        <span class="sc-btn">▼</span>
                    </div>
                    <div class="card-main">
                        <div class="card-header-row">
                            <span class="card-title">${item.name}</span>
                            <span class="tag ${item.status === 'ok' ? 'tag-ok' : 'tag-cp'}">${item.status.toUpperCase()}</span>
                        </div>
                        <div class="card-specs">${item.w}g | ${item.h}h ${item.m}m</div>
                        <div class="card-date">${item.date}</div>
                    </div>
                    <div class="card-data-row">
                        <div class="data-col">
                            <span class="data-lbl">NÁKLAD</span>
                            <span class="data-val val-danger">${displayCost.toFixed(2)} ${sym}</span>
                            <span class="data-sub">1ks ${(displayCost/item.count).toFixed(2)}</span>
                        </div>
                        <div class="data-col">
                            <span class="data-lbl">PREDAJ</span>
                            <span class="data-val val-primary">${displaySell.toFixed(2)} ${sym}</span>
                            <span class="data-sub">1ks ${item.pricePer.toFixed(2)}</span>
                        </div>
                    </div>
                    <div class="data-col" style="padding: 0 20px;">
                        <span class="data-lbl">ZISK</span>
                        <span class="data-val val-success">${displayProfit.toFixed(2)}${sym}</span>
                    </div>
                    <div class="card-actions">
                        <button class="act-btn act-btn-ok">OK</button>
                        <button class="act-btn" onclick="duplicateItem(${item.id})">❐</button>
                        <button class="act-btn" onclick="editItem(${item.id})">✎</button>
                        <button class="act-btn" onclick="deleteItem(${item.id})">🗑</button>
                    </div>
                </div>
            `;
        });

        document.getElementById('stat_obrat').innerText = sObrat.toFixed(2) + " " + sym;
        document.getElementById('total_mat_cost').innerText = sCost.toFixed(2) + " " + sym;
        document.getElementById('stat_profit').innerText = sProfit.toFixed(2) + " " + sym;
        document.getElementById('stat_count').innerText = items.length;
    }

    async function handleCloud(action) {
        let pass = prompt("Enter Password:");
        if(!pass) return;
        if(action === 'backup') {
            const res = await fetch(CLOUD_URL, { method: 'POST', body: JSON.stringify({action: 'backup', pass: pass, data: items, currency: currentCurr}) });
            alert("Backup Sent");
        } else if(action === 'restore') {
            const res = await fetch(`${CLOUD_URL}?action=restore&pass=${encodeURIComponent(pass)}`);
            const data = await res.json();
            if(data.data) { items = data.data; localStorage.setItem('3dee_data', JSON.stringify(items)); refreshUI(); alert("Restored!"); }
        } else if(action === 'register') {
            let nick = prompt("Enter Nick:");
            const res = await fetch(CLOUD_URL, { method: 'POST', body: JSON.stringify({action: 'register', nick: nick, pass: pass}) });
            alert("User Created");
        }
    }

    ['in_w', 'in_count', 'in_h', 'in_m', 'in_price_per', 'cfg_fil', 'cfg_ele'].forEach(id => {
        document.getElementById(id).addEventListener('input', updatePreview);
    });

    refreshUI();
</script>

</body>
</html>
