<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="config-bar">
        <label for="printerConsumption">Printer Consumption (kWh): </label>
        <input type="number" id="printerConsumption" placeholder="Enter printer consumption">

        <label for="electricityPrice">Electricity Price ($ per kWh): </label>
        <input type="number" id="electricityPrice" placeholder="Enter electricity price">

        <label for="filamentPrice">Filament Price ($ per kg): </label>
        <input type="number" id="filamentPrice" placeholder="Enter filament price">

        <label for="language">Language: </label>
        <select id="language">
            <option value="en">English</option>
            <option value="sk">Slovak</option>
        </select>

        <label for="currency">Currency: </label>
        <select id="currency">
            <option value="usd">USD</option>
            <option value="eur">EUR</option>
        </select>

        <button id="saveSettings" onclick="saveUserSettings()">Save Settings</button>
    </div>

    <h2>Your Prints</h2>
    <div id="items">
        <!-- This will display items dynamically with cost/sale per 1pc (design as on the image) -->
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbw7iEUOnu6gvL7k9aAbWgBIpKEoEBW582nxPaTaO51eWAyUsRT4PQGmZbIT0QMhb8tc/exec";
        const defaultSettings = {
            filamentPrice: 20,
            electricityPrice: 0.15,
            printerConsumption: 0.2,
            language: "en",
            currency: "usd"
        };

        let userSettings = { ...defaultSettings };

        function saveUserSettings() {
            userSettings.filamentPrice = parseFloat(document.getElementById('filamentPrice').value);
            userSettings.electricityPrice = parseFloat(document.getElementById('electricityPrice').value);
            userSettings.printerConsumption = parseFloat(document.getElementById('printerConsumption').value);
            userSettings.language = document.getElementById('language').value;
            userSettings.currency = document.getElementById('currency').value;

            // Save settings to cloud
            fetch(CLOUD_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "backup",
                    pass: "user-password", // Replace with user's password
                    settings: userSettings
                })
            }).then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert(`Error: ${data.message}`);
                } else {
                    alert("Settings saved successfully!");
                }
            });
        }

        function loadUserSettings() {
            fetch(`${CLOUD_URL}?action=restore&pass=user-password`) // Replace with user's password
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        alert(`Error: ${data.message}`);
                    } else {
                        userSettings = data.settings || defaultSettings;
                        updateSettingsUI();
                    }
                });
        }

        function updateSettingsUI() {
            document.getElementById('filamentPrice').value = userSettings.filamentPrice;
            document.getElementById('electricityPrice').value = userSettings.electricityPrice;
            document.getElementById('printerConsumption').value = userSettings.printerConsumption;
            document.getElementById('language').value = userSettings.language;
            document.getElementById('currency').value = userSettings.currency;
        }

        window.onload = loadUserSettings;
    </script>
</body>
</html>
